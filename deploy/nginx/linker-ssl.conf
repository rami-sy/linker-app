# Linker reverse proxy (Nginx) - HTTPS
#
# Use this after certbot has generated certificates:
#   certbot --nginx -d linker.land -d www.linker.land
#
# Copy to:
#   /etc/nginx/sites-available/linker.conf
# Then:
#   nginx -t && systemctl reload nginx

map $http_upgrade $connection_upgrade {
  default upgrade;
  ""      close;
}

server {
  listen 80;
  listen [::]:80;
  server_name linker.land www.linker.land;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name linker.land www.linker.land;

  ssl_certificate     /etc/letsencrypt/live/linker.land/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/linker.land/privkey.pem;

  client_max_body_size 50m;

  # WebSockets / Socket.IO stability
  proxy_read_timeout 3600;
  proxy_send_timeout 3600;

  location /socket.io/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
  }

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

