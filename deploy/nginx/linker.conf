# Linker reverse proxy (Nginx) - HTTP only (for initial setup)
#
# Copy to:
#   /etc/nginx/sites-available/linker.conf
# Enable:
#   ln -sf /etc/nginx/sites-available/linker.conf /etc/nginx/sites-enabled/linker.conf
#
# Then run:
#   nginx -t && systemctl reload nginx
#
# After this is live on port 80, run certbot:
#   certbot --nginx -d linker.land -d www.linker.land

map $http_upgrade $connection_upgrade {
  default upgrade;
  ""      close;
}

server {
  listen 80;
  listen [::]:80;
  server_name linker.land www.linker.land;

  client_max_body_size 50m;

  # WebSockets / Socket.IO stability
  proxy_read_timeout 3600;
  proxy_send_timeout 3600;

  location /socket.io/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
  }

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

